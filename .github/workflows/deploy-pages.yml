name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/

      - name: Generate Supabase config
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const required = ['SUPABASE_URL', 'SUPABASE_ANON_KEY'];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`Missing GitHub Environment values: ${missing.join(', ')}`);
          }

          const config = `// This file is generated by .github/workflows/deploy-pages.yml during deploy.
(function () {
  var DEFAULTS = {
    url: ${JSON.stringify(process.env.SUPABASE_URL)},
    anonKey: ${JSON.stringify(process.env.SUPABASE_ANON_KEY)}
  };
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('resume_db_config') || '{}'); } catch (e) {}
  window.SUPABASE_URL      = (saved && saved.url)     || DEFAULTS.url;
  window.SUPABASE_ANON_KEY = (saved && saved.anonKey) || DEFAULTS.anonKey;
})();
`;

          fs.writeFileSync('_site/portfolio/config.js', config);
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
